<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outreach Activities</title>
  <style>
    :root {
      --blue: #0038a8;
      --red: #ce1126;
      --gold: #fcd116;
      --ink: #17304f;
      --muted: #5f6f86;
      --line: #dbe4f0;
      --bg: #f5f8fc;
      --card: #ffffff;
      --soft: #f4f7fb;
      --shadow: 0 14px 36px rgba(23, 48, 79, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .flag {
      height: 8px;
      width: 220px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue) 0 45%, white 45% 55%, var(--red) 55% 100%);
      border: 1px solid #cfd9ea;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      color: var(--blue);
      font-size: 30px;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      max-width: 760px;
    }

    .toolbar {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search {
      flex: 1;
      min-width: 220px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: #90b7ff;
      box-shadow: 0 0 0 4px rgba(0, 56, 168, 0.08);
    }

    .count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(23, 48, 79, 0.08);
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .thumb-wrap {
      position: relative;
      background: #eaf1fb;
      cursor: pointer;
    }

    .thumb,
    .thumb-fallback {
      width: 100%;
      aspect-ratio: 16 / 10;
      display: block;
    }

    .thumb {
      object-fit: cover;
      background: #eaf1fb;
    }

    .thumb-fallback {
      background: linear-gradient(135deg, #edf4ff, #f8fbff);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      font-weight: 700;
      letter-spacing: 0.03em;
      font-size: 14px;
      text-align: center;
      padding: 14px;
    }

    .thumb-badge {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: rgba(0, 56, 168, 0.9);
      color: white;
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
    }

    .content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .pill {
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 5px 8px;
      border-radius: 999px;
    }

    .title {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
      color: var(--ink);
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      flex: 1;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
    }

    .btn-primary {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    .btn-secondary {
      background: white;
      color: var(--blue);
      border-color: var(--line);
    }

    .empty, .loading, .error {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      color: var(--muted);
      box-shadow: 0 10px 28px rgba(23, 48, 79, 0.06);
    }

    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(10, 18, 33, 0.82);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 9999;
    }

    .viewer.open {
      display: flex;
    }

    .viewer-dialog {
      width: min(1000px, 100%);
      max-height: 92vh;
      background: #0d1b33;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
    }

    .viewer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: white;
    }

    .viewer-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .viewer-sub {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }

    .viewer-close {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: white;
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .viewer-stage {
      position: relative;
      background: #091224;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .viewer-image {
      max-width: 100%;
      max-height: 68vh;
      object-fit: contain;
      border-radius: 12px;
      background: #091224;
    }

    .viewer-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: white;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer-prev { left: 12px; }
    .viewer-next { right: 12px; }

    .viewer-bottom {
      padding: 14px 16px 16px;
      background: rgba(255,255,255,0.04);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      color: white;
    }

    .viewer-count {
      font-size: 13px;
      opacity: 0.88;
    }

    .viewer-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      background: #ffffff;
      color: var(--blue);
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 18px 14px 28px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 26px;
      }

      .viewer-stage {
        min-height: 280px;
      }

      .viewer-nav {
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="flag"></div>
      <h1>Outreach Activities</h1>
      <div class="subtitle">
        Outreach activities, consular missions, and community events of the Philippine Embassy in Warsaw.
      </div>
      <div class="toolbar">
        <input
          id="searchInput"
          class="search"
          type="text"
          placeholder="Search by title, location, or description..."
        />
        <div id="count" class="count">Loading...</div>
      </div>
    </section>

    <div id="state" class="loading">Loading outreach activities...</div>
    <section id="gallery" class="grid" hidden></section>
  </div>

  <div id="viewer" class="viewer" aria-hidden="true">
    <div class="viewer-dialog">
      <div class="viewer-top">
        <div>
          <div id="viewerTitle" class="viewer-title">Outreach Activity</div>
          <div id="viewerSub" class="viewer-sub"></div>
        </div>
        <button id="viewerClose" class="viewer-close" type="button">Close</button>
      </div>

      <div class="viewer-stage">
        <button id="viewerPrev" class="viewer-nav viewer-prev" type="button" aria-label="Previous image">‹</button>
        <img id="viewerImage" class="viewer-image" alt="Outreach image" />
        <button id="viewerNext" class="viewer-nav viewer-next" type="button" aria-label="Next image">›</button>
      </div>

      <div class="viewer-bottom">
        <div id="viewerCount" class="viewer-count">1 / 1</div>
        <a id="viewerFolderLink" class="viewer-link" href="#" target="_blank" rel="noopener noreferrer">Open Album</a>
      </div>
    </div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQadgQgapuFS50mqC_TBxuVOATJyJSgkwXX3HM7PWB4U_zrMSIT3Ko8_V74fth1KdsPd2ZRX-ORDZuZ/pub?output=csv";

    const stateEl = document.getElementById("state");
    const galleryEl = document.getElementById("gallery");
    const searchInputEl = document.getElementById("searchInput");
    const countEl = document.getElementById("count");

    const viewerEl = document.getElementById("viewer");
    const viewerImageEl = document.getElementById("viewerImage");
    const viewerTitleEl = document.getElementById("viewerTitle");
    const viewerSubEl = document.getElementById("viewerSub");
    const viewerCountEl = document.getElementById("viewerCount");
    const viewerFolderLinkEl = document.getElementById("viewerFolderLink");
    const viewerCloseEl = document.getElementById("viewerClose");
    const viewerPrevEl = document.getElementById("viewerPrev");
    const viewerNextEl = document.getElementById("viewerNext");

    let allItems = [];
    let currentViewerIndex = 0;
    let currentViewerItems = [];

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];

        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          result.push(current);
          current = "";
        } else {
          current += ch;
        }
      }

      result.push(current);
      return result.map(v => v.trim());
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toLocaleDateString("en-GB", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function renderImageOrFallback(item, index) {
      if (!item.coverPhoto) {
        return `
          <div class="thumb-wrap" data-view-index="${index}">
            <div class="thumb-fallback">${escapeHtml(item.title || "Outreach Activity")}</div>
            <div class="thumb-badge">Preview</div>
          </div>
        `;
      }

      return `
        <div class="thumb-wrap" data-view-index="${index}">
          <img
            class="thumb"
            src="${escapeHtml(item.coverPhoto)}"
            alt="${escapeHtml(item.title)}"
            loading="lazy"
            onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=&quot;thumb-fallback&quot;>${escapeHtml(item.title || "Outreach Activity")}</div>');"
          />
          <div class="thumb-badge">Preview</div>
        </div>
      `;
    }

    function render(items) {
      if (!items.length) {
        galleryEl.hidden = true;
        stateEl.hidden = false;
        stateEl.className = "empty";
        stateEl.innerHTML = "No published outreach activities found.";
        countEl.textContent = "0 activities";
        return;
      }

      stateEl.hidden = true;
      galleryEl.hidden = false;
      countEl.textContent = `${items.length} activit${items.length === 1 ? "y" : "ies"}`;
      currentViewerItems = items;

      galleryEl.innerHTML = items.map((item, index) => `
        <article class="card">
          ${renderImageOrFallback(item, index)}
          <div class="content">
            <div class="meta">
              <span class="pill">${escapeHtml(formatDate(item.date))}</span>
              <span class="pill">${escapeHtml(item.location)}</span>
            </div>
            <h2 class="title">${escapeHtml(item.title)}</h2>
            <p class="desc">${escapeHtml(item.description)}</p>
            <div class="actions">
              <button class="btn btn-primary preview-btn" type="button" data-view-index="${index}">View Slideshow</button>
              <a class="btn btn-secondary" href="${escapeHtml(item.folderLink)}" target="_blank" rel="noopener noreferrer">Open Album</a>
            </div>
          </div>
        </article>
      `).join("");

      bindPreviewActions();
    }

    function bindPreviewActions() {
      const triggers = document.querySelectorAll("[data-view-index]");
      triggers.forEach(el => {
        el.addEventListener("click", () => {
          const index = Number(el.getAttribute("data-view-index"));
          openViewer(index);
        });
      });
    }

    function updateViewer() {
      const item = currentViewerItems[currentViewerIndex];
      if (!item) return;

      viewerImageEl.src = item.coverPhoto || "";
      viewerImageEl.alt = item.title || "Outreach image";
      viewerTitleEl.textContent = item.title || "Outreach Activity";
      viewerSubEl.textContent = [formatDate(item.date), item.location].filter(Boolean).join(" • ");
      viewerCountEl.textContent = `${currentViewerIndex + 1} / ${currentViewerItems.length}`;
      viewerFolderLinkEl.href = item.folderLink || "#";
    }

    function openViewer(index) {
      currentViewerIndex = index;
      updateViewer();
      viewerEl.classList.add("open");
      viewerEl.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeViewer() {
      viewerEl.classList.remove("open");
      viewerEl.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function nextViewer() {
      if (!currentViewerItems.length) return;
      currentViewerIndex = (currentViewerIndex + 1) % currentViewerItems.length;
      updateViewer();
    }

    function prevViewer() {
      if (!currentViewerItems.length) return;
      currentViewerIndex = (currentViewerIndex - 1 + currentViewerItems.length) % currentViewerItems.length;
      updateViewer();
    }

    function applySearch() {
      const q = searchInputEl.value.trim().toLowerCase();

      if (!q) {
        render(allItems);
        return;
      }

      const filtered = allItems.filter(item => {
        return [
          item.title,
          item.location,
          item.description,
          item.date
        ].join(" ").toLowerCase().includes(q);
      });

      render(filtered);
    }

    fetch(sheetURL)
      .then(res => res.text())
      .then(csv => {
        const rows = csv.trim().split(/\r?\n/).slice(1);

        allItems = rows
          .map(row => parseCSVLine(row))
          .filter(cols => cols.length >= 8)
          .map(cols => ({
            id: cols[0] || "",
            date: cols[1] || "",
            title: cols[2] || "",
            location: cols[3] || "",
            description: cols[4] || "",
            folderLink: cols[5] || "",
            coverPhoto: cols[6] || "",
            status: (cols[7] || "").trim().toLowerCase()
          }))
          .filter(item => item.status === "published")
          .sort((a, b) => new Date(b.date) - new Date(a.date));

        render(allItems);
      })
      .catch(error => {
        console.error(error);
        galleryEl.hidden = true;
        stateEl.hidden = false;
        stateEl.className = "error";
        stateEl.innerHTML = "Unable to load outreach activities. Please check the sheet publishing settings and CSV link.";
        countEl.textContent = "Error";
      });

    searchInputEl.addEventListener("input", applySearch);
    viewerCloseEl.addEventListener("click", closeViewer);
    viewerNextEl.addEventListener("click", nextViewer);
    viewerPrevEl.addEventListener("click", prevViewer);

    viewerEl.addEventListener("click", (event) => {
      if (event.target === viewerEl) {
        closeViewer();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (!viewerEl.classList.contains("open")) return;

      if (event.key === "Escape") closeViewer();
      if (event.key === "ArrowRight") nextViewer();
      if (event.key === "ArrowLeft") prevViewer();
    });
  </script>
</body>
</html>
